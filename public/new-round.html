<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GolfMate — New Round</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hole-row td { padding: 6px 4px; }
    .hole-row input[type="number"]   { width: 64px; padding: 6px; margin: 0; }
    .hole-row input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
    #total-bar { background: var(--light); border-radius: 8px; padding: 16px 20px;
                 margin: 20px 0; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    #total-bar span { font-size: 1.5rem; font-weight: 700; color: var(--green); }
    .saving-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
                      align-items:center; justify-content:center; z-index:999; }
    .saving-overlay.active { display:flex; }
    .saving-box { background:white; border-radius:12px; padding:32px 48px; text-align:center; }
  </style>
</head>
<body>
  <nav>
    <span style="color:white; font-weight:700; font-size:1.2rem">⛳ GolfMate</span>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="new-round.html">New Round</a>
      <a href="history.html">History</a>
      <a href="stats.html">My Stats</a>
      <a href="courses.html">Courses</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="saving-overlay" id="saving-overlay">
    <div class="saving-box">
      <div style="font-size:2rem; margin-bottom:12px">⛳</div>
      <p style="font-size:1.1rem; font-weight:600">Saving round…</p>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2 style="margin-bottom:20px">Record New Round</h2>

      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:8px;">
        <label>Course
          <select id="course-select">
            <option value="">— Select a course —</option>
          </select>
        </label>
        <label>Date Played
          <input type="date" id="date-played">
        </label>
        <label>Penalties
          <input type="number" id="penalties" value="0" min="0" max="50">
        </label>
      </div>

      <!-- Totals bar -->
      <div id="total-bar">
        <div>Total Score: <span id="total-score">72</span></div>
        <div>Total Putts: <span id="total-putts">36</span></div>
        <div style="color:#888; font-size:.9rem">vs Par: <span id="vs-par">—</span></div>
      </div>

      <!-- Scorecard table -->
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th style="width:50px">Hole</th>
              <th>Strokes</th>
              <th>Putts</th>
              <th>Fairway Hit</th>
              <th>Green in Reg</th>
            </tr>
          </thead>
          <tbody id="hole-rows"></tbody>
        </table>
      </div>

      <div style="margin-top:20px; display:flex; gap:12px;">
        <button class="btn" onclick="submitRound()">Save Round</button>
        <a href="dashboard.html" class="btn btn-outline" style="text-decoration:none; padding:10px 22px;">Cancel</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logOut as firebaseLogOut } from '../src/auth.js';
    import { getCourses, saveRound } from '../src/db.js';

    const NUM_HOLES = 18;
    let currentUser = null;
    let selectedPar = 72;

    window.logout = async () => { await firebaseLogOut(); window.location.href = 'index.html'; };

    requireAuth(async (user) => {
      currentUser = user;

      // Load courses
      const courses = await getCourses();
      const sel = document.getElementById('course-select');
      courses.forEach(c => {
        const opt = document.createElement('option');
        opt.value       = c.id;
        opt.dataset.par = c.par || 72;
        opt.textContent = `${c.courseName} (par ${c.par})`;
        sel.appendChild(opt);
      });

      sel.addEventListener('change', () => {
        const opt = sel.options[sel.selectedIndex];
        selectedPar = Number(opt.dataset.par) || 72;
        updateTotals();
      });

      buildTable();
      document.getElementById('date-played').valueAsDate = new Date();
    });

    function buildTable() {
      const tbody = document.getElementById('hole-rows');
      tbody.innerHTML = '';
      for (let i = 1; i <= NUM_HOLES; i++) {
        const tr = document.createElement('tr');
        tr.className = 'hole-row';
        tr.innerHTML = `
          <td style="font-weight:600; text-align:center">${i}</td>
          <td><input type="number" id="s${i}" min="1" max="20" value="4" oninput="updateTotals()"></td>
          <td><input type="number" id="p${i}" min="0" max="10" value="2" oninput="updateTotals()"></td>
          <td style="text-align:center"><input type="checkbox" id="f${i}"></td>
          <td style="text-align:center"><input type="checkbox" id="g${i}"></td>
        `;
        tbody.appendChild(tr);
      }
      updateTotals();
    }

    window.updateTotals = function() {
      let score = 0, putts = 0;
      for (let i = 1; i <= NUM_HOLES; i++) {
        score += Number(document.getElementById(`s${i}`)?.value) || 0;
        putts += Number(document.getElementById(`p${i}`)?.value) || 0;
      }
      document.getElementById('total-score').textContent = score;
      document.getElementById('total-putts').textContent = putts;
      const vsPar = score - selectedPar;
      const vpEl  = document.getElementById('vs-par');
      vpEl.textContent = vsPar === 0 ? 'E' : (vsPar > 0 ? `+${vsPar}` : `${vsPar}`);
      vpEl.style.color = vsPar <= 0 ? 'var(--green)' : '#c62828';
    };

    window.submitRound = async () => {
      const courseId   = document.getElementById('course-select').value;
      const datePlayed = document.getElementById('date-played').value;
      const penalties  = Number(document.getElementById('penalties').value) || 0;

      if (!courseId)   { alert('Please select a course.'); return; }
      if (!datePlayed) { alert('Please select a date.'); return; }

      const holes = [];
      for (let i = 1; i <= NUM_HOLES; i++) {
        holes.push({
          holeNumber:        i,
          strokes:           Number(document.getElementById(`s${i}`).value),
          putts:             Number(document.getElementById(`p${i}`).value),
          fairwayHit:        document.getElementById(`f${i}`).checked,
          greenInRegulation: document.getElementById(`g${i}`).checked,
        });
      }

      document.getElementById('saving-overlay').classList.add('active');
      try {
        await saveRound(currentUser.uid, { courseId, datePlayed, penalties }, holes);
        window.location.href = 'history.html';
      } catch (e) {
        document.getElementById('saving-overlay').classList.remove('active');
        alert('Error saving round: ' + e.message);
      }
    };
  </script>
</body>
</html>
