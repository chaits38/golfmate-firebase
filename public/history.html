<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GolfMate — Round History</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .detail-row td { background: var(--light); padding: 0; }
    .detail-inner  { padding: 16px 24px; overflow-x: auto; }
    .hole-mini     { border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .hole-mini th, .hole-mini td { padding: 6px 10px; border: 1px solid #ccc; text-align: center; }
    .hole-mini th  { background: var(--green); color: white; }
    .delete-btn    { background: #c62828; color: white; border: none; padding: 5px 12px;
                     border-radius: 4px; cursor: pointer; font-size: 13px; }
    .delete-btn:hover { background: #b71c1c; }
    .expand-btn { background: none; border: none; cursor: pointer;
                  color: var(--green); font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <nav>
    <span style="color:white; font-weight:700; font-size:1.2rem">⛳ GolfMate</span>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="new-round.html">New Round</a>
      <a href="history.html">History</a>
      <a href="stats.html">My Stats</a>
      <a href="courses.html">Courses</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <h1>Round History</h1>
      <a href="new-round.html" class="btn">+ New Round</a>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <div id="loading" style="padding:24px; color:#888;">Loading…</div>
      <div id="no-rounds" style="display:none; padding:24px; color:#888;">
        No rounds recorded yet. <a href="new-round.html">Record your first round!</a>
      </div>
      <table id="history-table" style="display:none">
        <thead>
          <tr>
            <th style="width:36px"></th>
            <th>Date</th>
            <th>Course</th>
            <th>Score</th>
            <th>vs Par</th>
            <th>Putts</th>
            <th>Penalties</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logOut as firebaseLogOut } from '../src/auth.js';
    import { getRoundHistory, getRound, deleteRound } from '../src/db.js';

    window.logout = async () => { await firebaseLogOut(); window.location.href = 'index.html'; };

    let allRounds = [];

    requireAuth(async (user) => {
      allRounds = await getRoundHistory(user.uid);
      document.getElementById('loading').style.display = 'none';

      if (allRounds.length === 0) {
        document.getElementById('no-rounds').style.display = 'block';
        return;
      }

      const table = document.getElementById('history-table');
      table.style.display = 'table';
      renderRows();
    });

    function renderRows() {
      const tbody = document.getElementById('history-body');
      tbody.innerHTML = '';
      allRounds.forEach((r, idx) => {
        const date   = r.datePlayed.toDate().toISOString().split('T')[0];
        const vsPar  = r.totalScore - (r.par || 72);
        const vsStr  = vsPar === 0 ? 'E' : (vsPar > 0 ? `+${vsPar}` : `${vsPar}`);
        const vsColor = vsPar <= 0 ? 'var(--green)' : '#c62828';

        const tr = document.createElement('tr');
        tr.id = `row-${r.id}`;
        tr.innerHTML = `
          <td><button class="expand-btn" onclick="toggleDetail('${r.id}', this)">▶</button></td>
          <td>${date}</td>
          <td>${r.courseName}</td>
          <td><strong>${r.totalScore}</strong></td>
          <td style="color:${vsColor}; font-weight:600">${vsStr}</td>
          <td>${r.totalPutts}</td>
          <td>${r.penalties || 0}</td>
          <td><button class="delete-btn" onclick="removeRound('${r.id}')">Delete</button></td>
        `;
        tbody.appendChild(tr);

        // Hidden detail row
        const detail = document.createElement('tr');
        detail.id        = `detail-${r.id}`;
        detail.className = 'detail-row';
        detail.style.display = 'none';
        detail.innerHTML = `<td colspan="8"><div class="detail-inner" id="holes-${r.id}">Loading holes…</div></td>`;
        tbody.appendChild(detail);
      });
    }

    window.toggleDetail = async (roundId, btn) => {
      const detail = document.getElementById(`detail-${roundId}`);
      const isOpen = detail.style.display !== 'none';

      if (isOpen) {
        detail.style.display = 'none';
        btn.textContent = '▶';
        return;
      }

      detail.style.display = 'table-row';
      btn.textContent = '▼';

      const container = document.getElementById(`holes-${roundId}`);
      if (container.dataset.loaded) return;
      container.dataset.loaded = '1';

      const round = await getRound(roundId);
      if (!round?.holes?.length) {
        container.innerHTML = '<em>No hole data found.</em>';
        return;
      }

      container.innerHTML = `
        <strong>Hole-by-Hole Scorecard</strong>
        <table class="hole-mini">
          <thead>
            <tr>
              <th>Hole</th><th>Strokes</th><th>Putts</th><th>Fairway</th><th>GIR</th>
            </tr>
          </thead>
          <tbody>
            ${round.holes.map(h => `
              <tr>
                <td>${h.holeNumber}</td>
                <td><strong>${h.strokes}</strong></td>
                <td>${h.putts}</td>
                <td>${h.fairwayHit        ? '✅' : '—'}</td>
                <td>${h.greenInRegulation ? '✅' : '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    };

    window.removeRound = async (roundId) => {
      if (!confirm('Delete this round? This cannot be undone.')) return;
      await deleteRound(roundId);
      allRounds = allRounds.filter(r => r.id !== roundId);
      if (allRounds.length === 0) {
        document.getElementById('history-table').style.display = 'none';
        document.getElementById('no-rounds').style.display = 'block';
      } else {
        renderRows();
      }
    };
  </script>
</body>
</html>
